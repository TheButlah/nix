auth {
	pam {
		enabled = true
		module = hyprlock
	}

	fingerprint {
		enabled = true
		ready_message = Scan fingerprint to unlock
		present_message = Scanning...
		retry_delay = 250
	}
}

general {
	hide_cursor = true
	ignore_empty_input = true
}

background {
	monitor =
	path = screenshot
	color = rgba(0, 0, 0, 1.0)

	blur_passes = 3
	blur_size = 8

	noise = 0.0117
	contrast = 0.9
	brightness = 0.75
	vibrancy = 0.15
	vibrancy_darkness = 0.05
}

label {
	monitor =
	text = $FPRINTPROMPT
	color = rgba(255, 255, 255, 0.85)
	font_size = 15
	font_family = Sans
	text_align = center

	position = 0, 55
	halign = center
	valign = center
}

input-field {
	monitor =
	size = 280, 55
	outline_thickness = 1

	dots_size = 0.22
	dots_spacing = 0.18
	dots_center = true

	outer_color = rgba(255, 255, 255, 0.25)
	inner_color = rgba(0, 0, 0, 0.35)
	font_color = rgba(255, 255, 255, 0.9)

	placeholder_text = <i>Password...</i>
	fade_on_empty = false

	rounding = 12

	position = 0, 0
	halign = center
	valign = center
}
